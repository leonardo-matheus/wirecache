name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wirecache
            asset_name: wirecache-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wirecache.exe
            asset_name: wirecache-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binário
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Publicar release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Baixar todos os binários
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Renomear assets
        run: |
          mv artifacts/wirecache-linux-x86_64/wirecache       artifacts/wirecache-linux-x86_64
          mv artifacts/wirecache-windows-x86_64.exe/wirecache.exe artifacts/wirecache-windows-x86_64.exe

      - name: Empacotar clients
        run: |
          zip -j artifacts/wirecache-clients.zip \
            clients/python/wirecache.py \
            clients/javascript/wirecache.js \
            clients/java/WireCacheClient.java

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wirecache-linux-x86_64
            artifacts/wirecache-windows-x86_64.exe
            artifacts/wirecache-clients.zip
